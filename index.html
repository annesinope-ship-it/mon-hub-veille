<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Veille Stratégique</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hub Veille">
<link rel="manifest" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --ld:#1D9E75;--ld-light:#E6F7F0;
  --tr:#2563EB;--tr-light:#EEF4FF;
  --cl:#7C3AED;--cl-light:#F3EFFE;
  --co:#D85A30;--co-light:#FEF0EA;
  --cx:#BE185D;--cx-light:#FDF0F6;
  --bg:#F4F2ED;--surface:#fff;--border:#E2DFD6;
  --text:#18181B;--muted:#6B7280;--soft:#9CA3AF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--ld)}
.hdr-right{display:flex;align-items:center;gap:12px}
#last-update{font-size:12px;color:var(--muted)}
.btn-all{background:var(--text);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.btn-all:hover{opacity:.82}
.btn-all:disabled{opacity:.4;cursor:not-allowed}
.progress-wrap{height:3px;background:var(--border);display:none}
.progress-fill{height:100%;background:var(--ld);transition:width .4s;width:0}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;overflow-x:auto;gap:2px}
nav::-webkit-scrollbar{display:none}
.nb{padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s}
.nb:hover{color:var(--text)}
.nb.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.np{width:7px;height:7px;border-radius:50%}

main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.panel{display:none}.panel.active{display:block}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:1.5rem}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.ov-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.ov-card.ld::after{background:var(--ld)}.ov-card.tr::after{background:var(--tr)}.ov-card.cl::after{background:var(--cl)}.ov-card.co::after{background:var(--co)}.ov-card.cx::after{background:var(--cx)}
.ov-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.ov-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ov-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ov-aud{font-size:11px;color:var(--muted);margin-bottom:8px}
.ov-snip{font-size:12px;color:var(--muted);line-height:1.5}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.b-ok{background:#E6F7F0;color:#0F6E56}.b-no{background:#F1EFE8;color:#78716C}.b-load{background:#FEF3C7;color:#92400E}
.howto{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;font-size:13px;color:var(--muted);line-height:1.7}
.howto strong{color:var(--text);font-weight:500}

/* NEWSLETTER HEADER */
.nl-hdr{padding:1.75rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.75rem}
.nl-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:.6rem}
.nl-dot{width:8px;height:8px;border-radius:50%}
.nl-eye-txt{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.nl-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.4px;margin-bottom:.5rem}
.nl-sub{font-size:15px;font-weight:300;color:var(--muted);font-style:italic;margin-bottom:1.1rem}
.nl-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.nl-tags{display:flex;flex-wrap:wrap;gap:5px}
.nl-tag{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.nl-btns{display:flex;gap:7px}
.btn-x{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .15s;font-family:'DM Sans',sans-serif}
.btn-x:hover{background:var(--bg)}
.btn-x.dark{background:var(--text);color:#fff;border-color:transparent}
.btn-x.dark:hover{opacity:.82;background:var(--text)}

/* DIGEST SECTIONS */
.digest{display:flex;flex-direction:column;gap:12px}

/* CARD BASE */
.dc{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.dc-head{display:flex;align-items:center;gap:10px;padding:.85rem 1.25rem;border-bottom:1px solid var(--border)}
.dc-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--soft)}
.dc-lbl{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text)}
.dc-body{padding:1.1rem 1.25rem;font-size:14px;line-height:1.8;color:#374151}
.dc-body p{margin-bottom:.8em}.dc-body p:last-child{margin-bottom:0}

/* STAT PILL inside card */
.stat-pill{display:inline-flex;align-items:baseline;gap:6px;background:var(--bg);border-radius:8px;padding:6px 12px;margin:.5rem 0;font-size:13px}
.stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.stat-lbl{font-size:12px;color:var(--muted)}

/* CAS cards grid */
.cas-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;padding:1.1rem 1.25rem}
.cas-item{background:var(--bg);border-radius:10px;padding:.9rem 1rem}
.cas-co{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-bottom:4px}
.cas-txt{font-size:13px;line-height:1.65;color:#374151}
.cas-lesson{font-size:12px;font-weight:500;color:var(--text);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}

/* TENSIONS */
.tension-list{display:flex;flex-direction:column;gap:0;padding:0 1.25rem}
.tension-item{padding:.9rem 0;border-bottom:1px solid var(--bg);display:grid;grid-template-columns:auto 1fr;gap:.75rem;align-items:start}
.tension-item:last-child{border-bottom:none}
.tension-vs{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;background:var(--bg);border-radius:6px;padding:4px 8px;white-space:nowrap;color:var(--text)}
.tension-txt{font-size:13px;line-height:1.65;color:#374151}

/* QUESTIONS */
.q-list{padding:.75rem 1.25rem;display:flex;flex-direction:column;gap:8px}
.q-item{display:flex;gap:10px;padding:.65rem .85rem;border-radius:8px;background:var(--bg);align-items:flex-start}
.q-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--soft);flex-shrink:0;margin-top:1px}
.q-txt{font-size:13px;line-height:1.6;color:#374151}

/* PUNCHLINE */
.punchline{border-radius:14px;padding:1.5rem 1.75rem;margin-top:4px}
.pl-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.55;margin-bottom:.6rem}
.pl-txt{font-family:'Syne',sans-serif;font-size:19px;font-weight:600;line-height:1.4;letter-spacing:-.2px}
.pl-synth{font-size:13px;line-height:1.7;opacity:.8;margin-bottom:.85rem}

/* EMPTY / LOADING */
.nl-empty{padding:3.5rem 0;text-align:center;color:var(--muted);font-size:14px}
.nl-empty strong{display:block;color:var(--text);font-weight:500;font-size:15px;margin-bottom:5px}
.nl-loading{padding:3.5rem 0;display:flex;flex-direction:column;align-items:center;gap:1rem}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nl-loading p{font-size:13px;color:var(--muted)}

/* HISTORY */
.h-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:1.5rem}
.h-week{margin-bottom:1.5rem}
.h-wlbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:10px}
.h-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:7px}
.h-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.h-dot{width:7px;height:7px;border-radius:50%}
.h-lbl{font-size:13px;font-weight:500}
.h-date{font-size:11px;color:var(--muted);margin-left:auto}
.h-memo{font-size:12px;color:var(--muted);line-height:1.6}

@media(max-width:640px){main{padding:1.25rem 1rem}header,nav{padding-left:1rem;padding-right:1rem}.nl-title{font-size:22px}.cas-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">Hub<span>.</span>Veille</div>
  <div class="hdr-right">
    <span id="last-update">Jamais actualisé</span>
    <button class="btn-all" id="btn-all" onclick="refreshAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Tout actualiser
    </button>
  </div>
</header>
<div class="progress-wrap" id="pw"><div class="progress-fill" id="pf"></div></div>

<nav id="main-nav">
  <button class="nb active" data-view="overview">Vue d'ensemble</button>
  <button class="nb" data-view="ld"><span class="np" style="background:var(--ld)"></span>L&D</button>
  <button class="nb" data-view="tr"><span class="np" style="background:var(--tr)"></span>Treasury</button>
  <button class="nb" data-view="cl"><span class="np" style="background:var(--cl)"></span>Cloud</button>
  <button class="nb" data-view="co"><span class="np" style="background:var(--co)"></span>Consolidation</button>
  <button class="nb" data-view="cx"><span class="np" style="background:var(--cx)"></span>Customer Experience</button>
  <button class="nb" data-view="history">Historique</button>
</nav>

<main>
  <div class="panel active" id="view-overview">
    <div class="ov-grid" id="ov-grid"></div>
    <div class="howto">Chaque semaine, cliquez sur <strong>Tout actualiser</strong> pour générer les 5 newsletters. Chaque édition est structurée pour être lue en 5 minutes et vous permettre de tenir une conversation de qualité avec des C-levels.</div>
  </div>
  <div class="panel" id="view-ld"></div>
  <div class="panel" id="view-tr"></div>
  <div class="panel" id="view-cl"></div>
  <div class="panel" id="view-co"></div>
  <div class="panel" id="view-cx"></div>
  <div class="panel" id="view-history">
    <div class="h-title">Historique</div>
    <div id="hist-wrap"><p style="font-size:14px;color:var(--muted)">L'historique se constitue à chaque actualisation.</p></div>
  </div>
</main>

<script>
const PROMPT = (label, ctx) => `Tu es expert senior en ${label}. Tu écris une newsletter de veille en français pour un non-expert qui organise des dîners avec des ${ctx}.

RÈGLES ABSOLUES DE FORMAT :
- Chaque section commence par son titre EXACTEMENT comme indiqué, seul sur sa ligne
- Après chaque titre, saute une ligne puis écris le contenu
- Sépare les paragraphes par une ligne vide
- Sois concis : 2-3 paragraphes max par section, phrases courtes et percutantes
- Pas de bullet points sauf pour QUESTIONS À POSER
- Pour CAS ENTREPRISES : écris exactement 3 blocs séparés par "---" avec format: NOM ENTREPRISE\nSituation + problème + décision\nLeçon: [une phrase]
- Pour TENSIONS CLÉS : écris exactement 3 lignes format "X vs Y :: explication courte"
- Pour QUESTIONS À POSER : exactement 5 questions numérotées 1. 2. 3. 4. 5.
- Pour SYNTHÈSE ET PHRASE CLÉ : d'abord 2-3 phrases de synthèse, puis une ligne commençant par "PHRASE:" suivie de la punchline

Génère ces 7 sections dans cet ordre exact :

LECTURE DU MARCHÉ

CAS ENTREPRISES

ANALYSE DES ÉDITEURS

TENSIONS CLÉS

ENJEUX CLIENTS

QUESTIONS À POSER

SYNTHÈSE ET PHRASE CLÉ

Commence directement par LECTURE DU MARCHÉ.`;

const TOPICS=[
  {id:'ld',label:'L&D',cls:'ld',color:'#1D9E75',audience:['Dir. Learning','Dir. L&D','Dir. Formation','Dir. Talent','DRH'],ctx:'Directeurs Learning, L&D, Formation, Talent et DRH (C-level)'},
  {id:'tr',label:'Treasury',cls:'tr',color:'#2563EB',audience:['Dir. Trésorerie','Dir. Cash Mgmt','CFO','Dir. Transfo Finance'],ctx:'Directeurs Trésorerie, Cash Management, CFO et Directeurs Transformation Finance (C-level)'},
  {id:'cl',label:'Cloud',cls:'cl',color:'#7C3AED',audience:['Dir. Cloud','CIO','CISO','RSSI'],ctx:'CIO, CISO, RSSI et Directeurs Cloud (C-level)'},
  {id:'co',label:'Consolidation',cls:'co',color:'#D85A30',audience:['Dir. Consolidation','DAF','CFO','Dir. Reporting'],ctx:'Directeurs Consolidation, DAF et CFO (C-level)'},
  {id:'cx',label:'Customer Experience',cls:'cx',color:'#BE185D',audience:['Dir. Marketing','Dir. Expérience Client','CCO','Dir. CX'],ctx:'Directeurs Marketing, Expérience Client et CCO (C-level)'}
];

const SECS=[
  {key:'LECTURE DU MARCHÉ',num:'01',lbl:'Lecture du marché',type:'text'},
  {key:'CAS ENTREPRISES',num:'02',lbl:'Cas entreprises',type:'cas'},
  {key:'ANALYSE DES ÉDITEURS',num:'03',lbl:'Analyse des éditeurs',type:'text'},
  {key:'TENSIONS CLÉS',num:'04',lbl:'Tensions clés',type:'tensions'},
  {key:'ENJEUX CLIENTS',num:'05',lbl:'Enjeux clients',type:'text'},
  {key:'QUESTIONS À POSER',num:'06',lbl:'Questions à poser',type:'questions'},
  {key:'SYNTHÈSE ET PHRASE CLÉ',num:'07',lbl:'Synthèse',type:'synthese'}
];

let state={newsletters:{},history:[]};

window.addEventListener('DOMContentLoaded',async()=>{
  genManifest();loadLocal();renderAll();
  await loadKV();renderAll();
});

function genManifest(){
  const c=document.createElement('canvas');c.width=192;c.height=192;
  const x=c.getContext('2d');
  x.fillStyle='#18181B';x.roundRect(0,0,192,192,28);x.fill();
  x.fillStyle='#1D9E75';x.fillRect(28,28,8,136);
  x.fillStyle='#fff';x.font='bold 76px sans-serif';x.fillText('H',52,128);
  const m={name:'Hub Veille',short_name:'Hub Veille',start_url:'/',display:'standalone',background_color:'#F4F2ED',theme_color:'#18181B',icons:[{src:c.toDataURL(),sizes:'192x192',type:'image/png'}]};
  document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
}

function loadLocal(){try{const s=localStorage.getItem('hv4');if(s)state=JSON.parse(s);}catch(e){}}
function saveLocal(){try{localStorage.setItem('hv4',JSON.stringify(state));}catch(e){}}
async function loadKV(){try{const r=await fetch('/data');if(!r.ok)return;const d=await r.json();if(d.newsletters&&Object.keys(d.newsletters).length)state.newsletters=d.newsletters;if(d.history&&d.history.length)state.history=d.history;}catch(e){}}
async function saveKV(){try{await fetch('/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newsletters:state.newsletters,history:state.history})});}catch(e){}}

async function refreshAll(){
  const btn=document.getElementById('btn-all');
  btn.disabled=true;
  btn.innerHTML='<div style="width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite"></div> Génération…';
  document.getElementById('pw').style.display='block';
  setP(2);
  for(let i=0;i<TOPICS.length;i++){
    setP(5+(i/TOPICS.length)*88);
    markLoad(TOPICS[i].id);
    await genOne(TOPICS[i]);
    renderOv();
  }
  setP(100);
  setTimeout(()=>{document.getElementById('pw').style.display='none';setP(0);},600);
  btn.disabled=false;
  btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Tout actualiser';
  updDate();saveLocal();await saveKV();
}

async function genOne(t){
  try{
    const r=await fetch('/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:PROMPT(t.label,t.ctx)}]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const text=d.content?.[0]?.text||'';
    archive(t);
    state.newsletters[t.id]={text,date:today(),week:getWeek(),memo:makeMemo(text)};
    renderPanel(t.id);
  }catch(e){
    state.newsletters[t.id]={text:'ERREUR\n\n'+e.message,date:today(),week:getWeek(),memo:''};
    renderPanel(t.id);
  }
}

async function regenOne(id){
  const t=TOPICS.find(x=>x.id===id);markLoad(id);
  await genOne(t);renderOv();updDate();saveLocal();await saveKV();
}

function archive(t){
  const p=state.newsletters[t.id];
  if(!p||!p.text||p.text.startsWith('ERREUR'))return;
  state.history.unshift({id:t.id,label:t.label,color:t.color,date:p.date,week:p.week,memo:p.memo||''});
  if(state.history.length>50)state.history=state.history.slice(0,50);
}

function makeMemo(text){
  const lines=text.split('\n').filter(l=>l.trim().length>40&&!SECS.some(s=>l.trim().toUpperCase().startsWith(s.key)));
  return lines.slice(0,2).map(l=>l.trim().replace(/^[-–*#]+\s*/,'')).join(' · ').substring(0,180);
}

function parseSections(text){
  const res=[];let cur=null;
  for(const line of text.split('\n')){
    const t=line.trim();
    const s=SECS.find(x=>t.toUpperCase().startsWith(x.key));
    if(s){if(cur)res.push(cur);cur={...s,body:''};}
    else if(cur)cur.body+=line+'\n';
  }
  if(cur)res.push(cur);
  return res.filter(s=>s.body.trim().length>5).map(s=>({...s,body:s.body.trim()}));
}

function renderCardText(s,color){
  const bodyHtml=s.body.split('\n\n').filter(p=>p.trim().length>0).map(p=>{
    const t=p.trim();
    // detect stat-like lines (number + text)
    const statM=t.match(/^(\d[\d\s%,.]*[%€$MKB]*)\s+(.+)$/);
    if(statM)return `<div class="stat-pill"><span class="stat-num" style="color:${color}">${statM[1]}</span><span class="stat-lbl">${statM[2]}</span></div>`;
    return `<p>${t}</p>`;
  }).join('');
  return `<div class="dc-body">${bodyHtml}</div>`;
}

function renderCardCas(s){
  const blocks=s.body.split(/\n---\n/);
  const casHtml=blocks.map(b=>{
    const lines=b.trim().split('\n').filter(l=>l.trim());
    if(!lines.length)return '';
    const name=lines[0];
    const lesson=lines.find(l=>l.toLowerCase().startsWith('leçon:'));
    const body=lines.filter(l=>l!==name&&l!==lesson).join(' ');
    return `<div class="cas-item">
      <div class="cas-co">${name}</div>
      <div class="cas-txt">${body}</div>
      ${lesson?`<div class="cas-lesson">${lesson}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="cas-grid">${casHtml}</div>`;
}

function renderCardTensions(s,color){
  const lines=s.body.split('\n').filter(l=>l.trim()&&l.includes('::'));
  if(!lines.length){
    return `<div class="dc-body">${s.body.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('')}</div>`;
  }
  const html=lines.map(l=>{
    const [vs,expl]=l.split('::');
    return `<div class="tension-item">
      <span class="tension-vs" style="color:${color}">${vs.trim()}</span>
      <span class="tension-txt">${expl?expl.trim():''}</span>
    </div>`;
  }).join('');
  return `<div class="tension-list">${html}</div>`;
}

function renderCardQuestions(s){
  const lines=s.body.split('\n').filter(l=>l.trim()&&/^\d\./.test(l.trim()));
  if(!lines.length){
    return `<div class="dc-body">${s.body.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('')}</div>`;
  }
  const html=lines.map((l,i)=>`<div class="q-item"><span class="q-num">0${i+1}</span><span class="q-txt">${l.replace(/^\d\.\s*/,'')}</span></div>`).join('');
  return `<div class="q-list">${html}</div>`;
}

function renderSynthese(s,color){
  const lines=s.body.split('\n').filter(l=>l.trim());
  const phraseIdx=lines.findIndex(l=>l.trim().toUpperCase().startsWith('PHRASE:'));
  const phrase=phraseIdx>=0?lines[phraseIdx].replace(/^PHRASE:\s*/i,'').trim():lines[lines.length-1];
  const synth=phraseIdx>=0?lines.slice(0,phraseIdx).join(' '):lines.slice(0,-1).join(' ');
  return `<div class="punchline" style="background:${color}">
    <div class="pl-lbl" style="color:#fff">Synthèse</div>
    ${synth?`<div class="pl-synth" style="color:#fff">${synth}</div>`:''}
    <div class="pl-lbl" style="color:#fff;margin-top:.5rem">Phrase à placer en conversation</div>
    <div class="pl-txt" style="color:#fff">${phrase}</div>
  </div>`;
}

function renderAll(){renderOv();TOPICS.forEach(t=>renderPanel(t.id));renderHistory();updDate();}

function renderOv(){
  document.getElementById('ov-grid').innerHTML=TOPICS.map(t=>{
    const n=state.newsletters[t.id];
    const ok=n&&n.text&&!n.text.startsWith('ERREUR');
    const badge=ok?`<span class="badge b-ok">${n.week||'ok'}</span>`:`<span class="badge b-no">—</span>`;
    const aud=t.audience.slice(0,2).join(', ')+(t.audience.length>2?'…':'');
    const snip=ok?(n.memo?n.memo.substring(0,75)+'…':'—'):'Pas encore généré';
    return `<div class="ov-card ${t.cls}" onclick="switchTo('${t.id}')">
      <div class="ov-top"><div class="ov-name" style="color:${t.color}">${t.label}</div>${badge}</div>
      <div class="ov-aud">${aud}</div>
      <div class="ov-snip">${snip}</div>
    </div>`;
  }).join('');
}

function markLoad(id){
  const el=document.getElementById('view-'+id);
  if(el)el.innerHTML='<div class="nl-loading"><div class="spinner"></div><p>Génération en cours…</p></div>';
}

function renderPanel(id){
  const el=document.getElementById('view-'+id);if(!el)return;
  const t=TOPICS.find(x=>x.id===id);
  const n=state.newsletters[id];
  const tags=t.audience.map(a=>`<span class="nl-tag">${a}</span>`).join('');

  const hdr=`<div class="nl-hdr">
    <div class="nl-eyebrow"><span class="nl-dot" style="background:${t.color}"></span><span class="nl-eye-txt">${t.label} · ${n?n.week||n.date:'Nouvelle édition'}</span></div>
    <div class="nl-title">${t.label}</div>
    <div class="nl-sub">Ce qu'il faut savoir cette semaine pour parler avec des ${t.audience[0]}s.</div>
    <div class="nl-meta">
      <div class="nl-tags">${tags}</div>
      <div class="nl-btns">
        ${n&&!n.text.startsWith('ERREUR')?`<button class="btn-x" onclick="copyTxt('${id}')">Copier</button>`:''}
        <button class="btn-x dark" onclick="regenOne('${id}')">Générer ↻</button>
      </div>
    </div>
  </div>`;

  if(!n){el.innerHTML=hdr+`<div class="nl-empty"><strong>Pas encore de newsletter</strong>Cliquez sur "Générer" pour créer l'édition.</div>`;return;}

  const secs=parseSections(n.text);
  const synthSec=secs.find(s=>s.key==='SYNTHÈSE ET PHRASE CLÉ');
  const otherSecs=secs.filter(s=>s.key!=='SYNTHÈSE ET PHRASE CLÉ');

  const cards=otherSecs.map(s=>{
    let bodyHtml;
    if(s.type==='cas') bodyHtml=renderCardCas(s);
    else if(s.type==='tensions') bodyHtml=renderCardTensions(s,t.color);
    else if(s.type==='questions') bodyHtml=renderCardQuestions(s);
    else bodyHtml=renderCardText(s,t.color);
    return `<div class="dc">
      <div class="dc-head" style="border-left:3px solid ${t.color}">
        <span class="dc-num">${s.num}</span>
        <span class="dc-lbl">${s.lbl}</span>
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');

  const synth=synthSec?renderSynthese(synthSec,t.color):'';
  el.innerHTML=hdr+`<div class="digest">${cards}</div>${synth}`;
}

function renderHistory(){
  const el=document.getElementById('hist-wrap');
  const h=state.history||[];
  if(!h.length){el.innerHTML=`<p style="font-size:14px;color:var(--muted)">L'historique se constitue à chaque actualisation.</p>`;return;}
  const g={};h.forEach(x=>{const k=x.week||x.date;if(!g[k])g[k]=[];g[k].push(x);});
  el.innerHTML=Object.entries(g).map(([w,items])=>`
    <div class="h-week">
      <div class="h-wlbl">${w}</div>
      ${items.map(x=>`<div class="h-item"><div class="h-top"><span class="h-dot" style="background:${x.color}"></span><span class="h-lbl">${x.label}</span><span class="h-date">${x.date}</span></div><div class="h-memo">${x.memo||'—'}</div></div>`).join('')}
    </div>`).join('');
}

function switchTo(id){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const b=document.querySelector(`.nb[data-view="${id}"]`);if(b)b.classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
  window.scrollTo(0,0);
}
document.getElementById('main-nav').addEventListener('click',e=>{
  const b=e.target.closest('.nb');if(!b)return;switchTo(b.dataset.view);
});

function copyTxt(id){const n=state.newsletters[id];if(n)navigator.clipboard.writeText(n.text);}
function setP(p){document.getElementById('pf').style.width=p+'%';}
function today(){return new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});}
function getWeek(){const n=new Date(),m=new Date(n);m.setDate(n.getDate()-n.getDay()+1);return 'Sem. '+m.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'});}
function updDate(){const d=Object.values(state.newsletters).map(n=>n.date).filter(Boolean);document.getElementById('last-update').textContent=d.length?'Mis à jour : '+d.sort().reverse()[0]:'Jamais actualisé';}
</script>
</body>
</html>
